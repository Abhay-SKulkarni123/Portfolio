<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_2 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_2" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_2');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0x3B82F6, 15); // Electric Blue
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

const purpleLight = new THREE.PointLight(0x8B5CF6, 10); // Violet
purpleLight.position.set(-5, -5, 5);
scene.add(purpleLight);

// Geometry: A "Neural Lattice" (Icosahedron with wireframe and points)
const geometry = new THREE.IcosahedronGeometry(2, 4);
const material = new THREE.MeshPhongMaterial({
  color: 0x1E1B4B,
  wireframe: true,
  transparent: true,
  opacity: 0.5,
  emissive: 0x3B82F6,
  emissiveIntensity: 0.2
});

const lattice = new THREE.Mesh(geometry, material);
scene.add(lattice);

// Core points
const pointsGeometry = new THREE.IcosahedronGeometry(2, 4);
const pointsMaterial = new THREE.PointsMaterial({
  color: 0x22D3EE, // Cyan
  size: 0.05,
  transparent: true,
  opacity: 0.8
});
const points = new THREE.Points(pointsGeometry, pointsMaterial);
scene.add(points);

camera.position.z = 5;

// Mouse Interaction
let mouseX = 0;
let mouseY = 0;
const handleMouseMove = (event) => {
  mouseX = (event.clientX / window.innerWidth) - 0.5;
  mouseY = (event.clientY / window.innerHeight) - 0.5;
};
window.addEventListener('mousemove', handleMouseMove);

const animate = () => {
  requestAnimationFrame(animate);
  
  lattice.rotation.x += 0.002;
  lattice.rotation.y += 0.003;
  points.rotation.x -= 0.001;
  points.rotation.y -= 0.002;

  lattice.position.x += (mouseX * 2 - lattice.position.x) * 0.05;
  lattice.position.y += (-mouseY * 2 - lattice.position.y) * 0.05;
  points.position.x = lattice.position.x;
  points.position.y = lattice.position.y;

  renderer.render(scene, camera);
};

animate();

window.addEventListener('resize', () => {
  const w = container.clientWidth || window.innerWidth;
  const h = container.clientHeight || window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_2 -->
</body>
</html>
